<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>FileCanopy report</title>
  <style>
    body { font-family: system-ui, sans-serif; margin: 2rem; }
    h1 { margin-bottom: 0.25rem; }
    table { border-collapse: collapse; width: 100%; }
    th, td { padding: 0.4rem 0.6rem; border-bottom: 1px solid #ddd; text-align: left; }
    th { background: #f5f5f5; }
    .num { font-variant-numeric: tabular-nums; text-align: right; }
    .treemap { margin: 1rem 0; }
  </style>
</head>
<body>
  <h1>FileCanopy report</h1>
  <p>Generated {{ generated_at }} for <code>{{ root }}</code></p>

  <section class="treemap">
    {{ treemap_svg|safe }}
  </section>

  <h2>Largest files</h2>
  <table>
    <thead><tr><th>Path</th><th class="num">Size</th></tr></thead>
    <tbody>
    {% for f in largest %}
      <tr><td>{{ f.path }}</td><td class="num">{{ f.size_human }}</td></tr>
    {% endfor %}
    </tbody>
  </table>
</body>
</html>
